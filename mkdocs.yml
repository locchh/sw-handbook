# Site
site_name: Software Handbook
site_description: A handbook about Software Engineering, Data and AI
site_author: locch
site_url: https://locchh.github.io/sw-handbook/

# Repository
repo_url: https://github.com/locchh/sw-handbook
repo_name: locch/sw-handbook
edit_uri: edit/main/docs/

# Theme
theme:
  name: material
  palette:
    # Darker color scheme
    primary: indigo
    accent: blue
  font:
    text: Roboto Mono
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.sections
    - content.code.copy

# Markdown extensions
markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.details
  - toc:
      permalink: true

# Extra JavaScript
extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid-init.js
  - javascripts/mathjax-init.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Plugins
plugins:
  - search
  - awesome-pages
  - llmstxt:
      markdown_description: |
        A comprehensive collection of notes about Software Engineering, Data Science, and Artificial Intelligence.
      sections:
        Software Engineering:
          - software/index.md
          - software/basics/*.md
          - software/tool_tip/*.md
        Data Science:
          - data/index.md
          - data/basics/*.md
        Artificial Intelligence:
          - ai/index.md
          - ai/basics/*.md
          - ai/tool_tip/*.md
        Reference:
          - about.md